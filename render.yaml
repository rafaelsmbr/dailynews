services:
  - type: web
    name: wired-rss-proxy
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wired_rss_proxy:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
